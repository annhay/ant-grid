syntax = "proto3";

package v1;

option go_package = "../../../internal/proto";
message SendTextMessageReq {
  string phone = 1;
}
message SendTextMessageResp {}

message RegisterReq {
  string phone = 1;
  string verificationCode = 2;
  string password = 3;
}
message RegisterResp {
  int64 id = 1;
}

message LoginReq {
  string phone = 1;
  string password = 2;
  string verificationCode = 3;
}
message LoginResp {
  int64 id = 1;
}

message CompleteInformationReq {
  int64 userId = 1;
  string cover = 2;
  string nickname = 3;
  string realName = 4;
  string idCard = 5;
}
message CompleteInformationResp {}
service User {
  rpc SendTextMessage(SendTextMessageReq) returns(SendTextMessageResp);//短信发送
  rpc Register(RegisterReq) returns(RegisterResp);//注册
  rpc Login(LoginReq) returns(LoginResp);//登录
  rpc CompleteInformation(CompleteInformationReq) returns(CompleteInformationResp);//完善信息
}